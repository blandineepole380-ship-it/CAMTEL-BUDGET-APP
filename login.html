<!doctype html>
<html lang='fr' id='lpage'><head><meta charset='utf-8'/>
<meta name='viewport' content='width=device-width,initial-scale=1'/>
<title>CAMTEL - Connexion / Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#0a1f4e 0%,#1f4d8f 55%,#00b0e8 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#fff;border-radius:16px;padding:32px 30px;width:440px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.lrow{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
.llogo{width:64px;height:64px;object-fit:contain;flex-shrink:0;}
h2{font-size:17px;font-weight:800;color:#0f2a5e;}
.sub{font-size:10px;color:#64748b;margin-top:2px;}
.lang-row{display:flex;gap:6px;justify-content:flex-end;margin-bottom:14px;}
.lang-btn{padding:4px 12px;border-radius:20px;border:1.5px solid #e2e8f0;background:#f8fafc;cursor:pointer;font-size:11px;font-weight:700;color:#475569;}
.lang-btn.active{background:#1f4d8f;color:#fff;border-color:#1f4d8f;}
label{display:block;font-size:11px;font-weight:700;color:#475569;margin:12px 0 4px;text-transform:uppercase;letter-spacing:.04em;}
input[type=text],input[type=password]{width:100%;padding:11px 12px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:14px;font-family:inherit;}
input:focus{outline:none;border-color:#00b0e8;box-shadow:0 0 0 3px rgba(0,176,232,.12);}
.submit-btn{width:100%;padding:12px;border-radius:8px;background:linear-gradient(135deg,#1f4d8f,#00b0e8);color:#fff;border:none;cursor:pointer;font-size:14px;font-weight:700;margin-top:18px;}
.submit-btn:hover{opacity:.92;}
.hint{color:#94a3b8;font-size:11px;margin-top:12px;text-align:center;}
.err{background:#fee2e2;color:#dc2626;padding:9px 12px;border-radius:6px;font-size:12px;margin-bottom:10px;border-left:3px solid #dc2626;}
.divider{border:none;border-top:1px solid #f1f5f9;margin:16px 0;}
</style></head>

    <div>
      <h2>CAMTEL</h2>
      <div class='sub' id='l-sub'>Gestion Budgétaire — SAAF / DCF / Contrôle Budgétaire</div>
    </div>
  </div>
  <div id="__ERR__"></div>
  <form id='lform' onsubmit='doLogin(event)'>
    <label id='l-user'>IDENTIFIANT</label>
    <input name='username' id='inp-user' placeholder='admin' required autofocus autocomplete='username'/>
    <label id='l-pass'>MOT DE PASSE</label>
    <input name='password' type='password' id='inp-pass' placeholder='••••••••' required autocomplete='current-password'/>
    <button type='submit' class='submit-btn' id='l-btn'>Se connecter →</button>
  </form>
  <div class='hint' id='l-hint'>Contactez l'administrateur pour vos accès.</div>
</div>
<script>
const LT={
  fr:{sub:'Gestion Budgétaire — SAAF / DCF / Contrôle Budgétaire',user:'IDENTIFIANT',pass:'MOT DE PASSE',btn:'Se connecter →',hint:"Contactez l'administrateur pour vos accès.",uph:'admin',pph:'••••••••'},
  en:{sub:'Budget Management — SAAF / DCF / Budget Control',user:'USERNAME',pass:'PASSWORD',btn:'Sign in →',hint:'Contact your administrator for access.',uph:'admin',pph:'••••••••'}
};
let curL=localStorage.getItem('camtel_lang')||'fr';
function setLang(l){
  curL=l;localStorage.setItem('camtel_lang',l);
  const tx=LT[l];
  document.getElementById('l-sub').textContent=tx.sub;
  document.getElementById('l-user').textContent=tx.user;
  document.getElementById('l-pass').textContent=tx.pass;
  document.getElementById('l-btn').textContent=tx.btn;
  document.getElementById('l-hint').textContent=tx.hint;
  document.getElementById('inp-user').placeholder=tx.uph;
  document.getElementById('inp-pass').placeholder=tx.pph;
  document.getElementById('lb-fr').className='lang-btn'+(l==='fr'?' active':'');
  document.getElementById('lb-en').className='lang-btn'+(l==='en'?' active':'');
}
setLang(curL);

async function doLogin(e){
  e.preventDefault();
  const btn=document.getElementById('l-btn');
  const u=document.getElementById('inp-user').value.trim();
  const p=document.getElementById('inp-pass').value;
  btn.disabled=true; btn.textContent='...';
  try{
    const r=await fetch('/api/login/token',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:u,password:p})
    });
    if(r.ok){
      const d=await r.json();
      sessionStorage.setItem('camtel_token',d.token);
      sessionStorage.setItem('camtel_role',d.role);
      window.location='/';
    } else {
      document.getElementById('__ERR__').innerHTML="<div class='err'>❌ Identifiants incorrects.</div>";
      btn.disabled=false; btn.textContent=LT[curL].btn;
    }
  }catch(err){
    document.getElementById('__ERR__').innerHTML="<div class='err'>❌ Erreur serveur.</div>";
    btn.disabled=false; btn.textContent=LT[curL].btn;
  }
}
</script>
