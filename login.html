<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>CAMTEL Budget App - Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width:420px">
  <div class="text-center mb-4">
    <img src="/static/img/logo_top.png" style="max-width:220px" onerror="this.style.display='none'"/>
    <h4 class="mt-3">CAMTEL Budget App</h4>
  </div>
  <div class="card shadow-sm">
    <div class="card-body">
      <div class="alert alert-info small mb-3">
        Default login: <b>admin</b> / <b>admin123</b>
      </div>
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input class="form-control" name="username" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" name="password" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">Login</button>
      </form>
      <div id="msg" class="text-danger small mt-3"></div>
    </div>
  </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const fd=new FormData(e.target);
  const res = await fetch('/api/login', {method:'POST', body:fd});
  if(res.ok){ location.href='/'; return; }
  const j = await res.json().catch(()=>({detail:'Login failed'}));
  document.getElementById('msg').textContent = j.detail || 'Login failed';
});
</script>
</body>
</html>
