<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ app_name }} - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container" style="max-width: 420px; margin-top: 90px;">
  <div class="card shadow-sm">
    <div class="card-body">
      <div class="d-flex align-items-center gap-2 mb-3">
        <img src="/static/img/logo.png" style="height:40px" onerror="this.style.display='none'"/>
        <h5 class="m-0">CAMTEL Budget App</h5>
      </div>
      {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
      {% endif %}
      <form method="post" action="/login">
        <div class="mb-2">
          <label class="form-label">Username</label>
          <input class="form-control" name="username" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" name="password" required>
        </div>
        <button class="btn btn-primary w-100">Login</button>
      </form>
      <div class="small text-muted mt-3">
        Admin is created automatically from <code>ADMIN_USERNAME</code>/<code>ADMIN_PASSWORD</code>.
      </div>
    </div>
  </div>
</div>
</body>
</html>
