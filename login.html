<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CAMTEL Budget - Login</title>
  <link rel="stylesheet" href="/static/styles.css"/>
</head>
<body class="bg">
  <div class="card">
    <div class="header">
      <img src="/static/logo.png" alt="Logo" onerror="this.style.display='none'"/>
      <h1>CAMTEL Budget App</h1>
      <p class="muted">Login to continue</p>
    </div>
    <div id="err" class="error" style="display:none"></div>
    <label>Username</label>
    <input id="u" placeholder="admin or user"/>
    <label>Password</label>
    <input id="p" type="password" placeholder="••••••••"/>
    <button id="btn">Login</button>
    <p class="muted small">Default admin: <b>admin</b> / <b>admin123</b> (change in Render env)</p>
  </div>

<script>
document.getElementById('btn').onclick = async () => {
  const username = document.getElementById('u').value.trim();
  const password = document.getElementById('p').value.trim();
  const res = await fetch('/api/login', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({username,password})
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok || !data.ok){
    const e = document.getElementById('err');
    e.style.display='block';
    e.textContent = data.error || 'Login failed';
    return;
  }
  location.href = '/app';
};
</script>
</body>
</html>
