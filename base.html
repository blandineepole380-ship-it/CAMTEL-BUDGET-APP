<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ app_name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="/transactions">CAMTEL Budget App</a>
    <div class="d-flex align-items-center gap-3">
      {% if me %}
        <span class="text-white small">User: <strong>{{ me.username }}</strong> ({{ me.role }})</span>
        {% if me.role == 'admin' %}
          <a class="btn btn-sm btn-light" href="/admin/users">Admin</a>
        {% endif %}
        <a class="btn btn-sm btn-outline-light" href="/logout">Logout</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container-fluid p-3">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
