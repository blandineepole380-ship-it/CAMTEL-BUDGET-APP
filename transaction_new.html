{% extends "base.html" %}
{% block content %}
<h5>New Transaction</h5>
<form method="post" action="/transactions/new" class="row g-3">
  <div class="col-md-2">
    <label class="form-label">Year</label>
    <input class="form-control" name="year" type="number" value="{{year}}" required>
  </div>
  <div class="col-md-2">
    <label class="form-label">Department</label>
    <select class="form-select" name="department" required onchange="location='/transactions/new?year={{year}}&dept='+this.value;">
      <option value="BUM" {% if department=='BUM' %}selected{% endif %}>BUM</option>
      <option value="DIG" {% if department=='DIG' %}selected{% endif %}>DIG</option>
      <option value="DRH" {% if department=='DRH' %}selected{% endif %}>DRH</option>
    </select>
  </div>
  <div class="col-md-2">
    <label class="form-label">Doc Type</label>
    <select class="form-select" name="doc_type" id="doc_type" required onchange="toggleDocFields()">
      <option value="OM">OM</option>
      <option value="BC">BC</option>
      <option value="AUTRE">AUTRE</option>
    </select>
  </div>
  <div class="col-md-3">
    <label class="form-label">Budget line (filtered)</label>
    <select class="form-select" name="budget_line_id" required>
      {% for b in lines %}
        <option value="{{b.id}}">{{b.code}} - {{b.title}} (CP {{ '{:,.0f}'.format(b.cp or 0) }})</option>
      {% endfor %}
    </select>
    <div class="small text-muted">If list is empty, Admin must add budget lines for this year & department.</div>
  </div>
  <div class="col-md-3">
    <label class="form-label">Code/Ref</label>
    <input class="form-control" name="code_ref" placeholder="Code/Ref">
  </div>

  <div class="col-md-6">
    <label class="form-label">Title / Description</label>
    <input class="form-control" name="title" placeholder="Title">
  </div>
  <div class="col-md-3">
    <label class="form-label">Doc Date</label>
    <input class="form-control" type="date" name="date_doc">
  </div>

  <!-- OM fields -->
  <div class="col-12" id="om_fields">
    <div class="row g-3">
      <div class="col-md-3">
        <label class="form-label">Date aller</label>
        <input class="form-control" type="date" name="date_aller" id="date_aller" onchange="calcOM()">
      </div>
      <div class="col-md-3">
        <label class="form-label">Date retour</label>
        <input class="form-control" type="date" name="date_retour" id="date_retour" onchange="calcOM()">
      </div>
      <div class="col-md-3">
        <label class="form-label">Amount / day</label>
        <input class="form-control" type="number" step="0.01" name="amount_per_day" id="amount_per_day" value="0" onchange="calcOM()">
      </div>
      <div class="col-md-3">
        <label class="form-label">Auto total</label>
        <input class="form-control" id="om_total" readonly>
        <div class="small text-muted">Days auto-calculated inclusive.</div>
      </div>
    </div>
  </div>

  <!-- BC fields -->
  <div class="col-12" id="bc_fields" style="display:none">
    <div class="row g-3">
      <div class="col-md-3">
        <label class="form-label">HT</label>
        <input class="form-control" type="number" step="0.01" name="ht" id="ht" value="0" onchange="calcBC()">
      </div>
      <div class="col-md-3">
        <label class="form-label">IR (%)</label>
        <select class="form-select" name="ir_rate" id="ir_rate" onchange="calcBC()">
          <option value="0">0%</option>
          <option value="2.2">2.2%</option>
          <option value="5.5">5.5%</option>
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label">TVA 19.25%</label>
        <input class="form-control" id="tva" readonly>
      </div>
      <div class="col-md-2">
        <label class="form-label">TTC</label>
        <input class="form-control" id="ttc" readonly>
      </div>
      <div class="col-md-2">
        <label class="form-label">Net à payer</label>
        <input class="form-control" id="net" readonly>
      </div>
      <div class="col-12 small text-muted">TTC = HT + TVA. Net à payer = TTC - IR.</div>
    </div>
  </div>


  <!-- AUTRE fields -->
  <div class="col-12" id="other_fields" style="display:none">
    <div class="row g-3">
      <div class="col-md-3">
        <label class="form-label">Amount (FCFA)</label>
        <input class="form-control" type="number" step="0.01" name="amount_other" id="amount_other" value="0">
      </div>
    </div>
  </div>

  <div class="col-12 d-flex gap-2">
    <button class="btn btn-primary">Save</button>
    <a class="btn btn-secondary" href="/transactions?year={{year}}&dept={{department}}">Cancel</a>
  </div>
</form>

<script>
function toggleDocFields(){
  const dt = document.getElementById('doc_type').value;
  document.getElementById('om_fields').style.display = (dt==='OM') ? '' : 'none';
  document.getElementById('bc_fields').style.display = (dt==='BC') ? '' : 'none';
}

function calcOM(){
  const a = document.getElementById('date_aller').value;
  const r = document.getElementById('date_retour').value;
  const p = parseFloat(document.getElementById('amount_per_day').value || '0');
  if(!a || !r){ document.getElementById('om_total').value = ''; return; }
  const da = new Date(a);
  const dr = new Date(r);
  const days = Math.floor((dr - da)/(1000*60*60*24)) + 1;
  const d = Math.max(days, 0);
  document.getElementById('om_total').value = (d*p).toFixed(0);
}

function calcBC(){
  const ht = parseFloat(document.getElementById('ht').value || '0');
  const ir = parseFloat(document.getElementById('ir_rate').value || '0');
  const tva = ht*0.1925;
  const ttc = ht + tva;
  const irv = ht*(ir/100.0);
  const net = ttc - irv;
  document.getElementById('tva').value = tva.toFixed(0);
  document.getElementById('ttc').value = ttc.toFixed(0);
  document.getElementById('net').value = net.toFixed(0);
}

calcOM();
calcBC();
</script>
{% endblock %}
