{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center">
  <h5>Users</h5>
  <a class="btn btn-secondary" href="/transactions">Back</a>
</div>

<form class="row g-2 mt-2" method="post" action="/admin/users/create">
  <div class="col-md-3"><input class="form-control" name="username" placeholder="username" required></div>
  <div class="col-md-3"><input class="form-control" type="password" name="password" placeholder="password" required></div>
  <div class="col-md-2">
    <select class="form-select" name="role">
      <option value="user">user</option>
      <option value="admin">admin</option>
    </select>
  </div>
  <div class="col-md-2"><button class="btn btn-primary">Create</button></div>
</form>

<div class="table-responsive mt-3">
  <table class="table table-sm table-striped">
    <thead><tr><th>Username</th><th>Role</th><th>Active</th><th>Created</th></tr></thead>
    <tbody>
    {% for u in users %}
      <tr>
        <td>{{u.username}}</td><td>{{u.role}}</td><td>{{u.is_active}}</td><td>{{u.created_at.strftime('%d/%m/%Y')}}</td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
</div>

<hr/>
<a class="btn btn-outline-primary" href="/admin/budget-lines">Manage Budget Lines</a>
{% endblock %}
